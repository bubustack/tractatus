name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    name: Go 1.25.x on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true

      - name: Run unit tests
        run: make test

      - name: Run race detector
        run: go test -race $(go list ./... | grep -v '^github.com/bubustack/tractatus/dist/')
