name: Publish Proto Bundle

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish-protos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Build proto bundle
        run: make proto-dist

      - name: Upload proto bundle to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} dist/tractatus-protos.tar.gz --clobber
